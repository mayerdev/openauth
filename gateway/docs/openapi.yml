openapi: 3.0.3
info:
  title: OpenAuth Gateway
  version: 1.0.0

paths:
  # ─── User API (authenticated) ────────────────────────────────────────────────

  /api/me:
    get:
      summary: Get current user info and credentials
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User info with credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/logout:
    post:
      summary: Invalidate current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/totp/start:
    post:
      summary: Begin TOTP setup — generates a new secret and provisioning URI
      security:
        - bearerAuth: []
      responses:
        "200":
          description: TOTP secret and otpauth:// URI for QR code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/totp/confirm:
    post:
      summary: Confirm TOTP setup with a code from the authenticator app
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpConfirmRequest"
      responses:
        "200":
          description: TOTP activated; backup codes returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpConfirmResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/totp/unlink:
    post:
      summary: Remove TOTP from the account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: TOTP removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tfa/method:
    get:
      summary: Get current TFA method
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current TFA method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TfaMethodResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      summary: Set TFA method
      description: |
        To set `totp`, TOTP must already be configured via `/api/totp/confirm`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TfaMethodRequest"
      responses:
        "200":
          description: TFA method updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── OAuth2 Core ─────────────────────────────────────────────────────────────

  /oauth2/authorize:
    get:
      summary: Initialize authorization session
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: state
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            default: openid
      responses:
        "200":
          description: Auth session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeInitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      summary: Submit email/password credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Redirect URL or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccessResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /oauth2/tfa:
    post:
      summary: Submit TFA code (TOTP, email, or phone)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TFARequest"
      responses:
        "200":
          description: Redirect URL with authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /oauth2/token:
    post:
      summary: Exchange authorization code or refresh token for tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Auth Methods ─────────────────────────────────────────────────────────────

  /oauth2/methods/email/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Redirect URL or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccessResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /oauth2/methods/email/register:
    post:
      summary: Register with email and password
      description: |
        Creates a new account and sends a verification code to the provided email.
        Tokens are NOT issued immediately — the client must verify the email first
        via `POST /oauth2/methods/email/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Verification required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationRequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/email/verify:
    post:
      summary: Verify email with the code received after registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialVerifyRequest"
      responses:
        "200":
          description: Email verified — redirect URL with authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/email/verify/resend:
    post:
      summary: Resend verification code
      description: |
        Rate-limited — subject to `verification.resend_interval` (default 60 s).
        Returns `resend_failed` with description `"Resend too soon"` if called too early.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialVerifyResendRequest"
      responses:
        "200":
          description: Code resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/oauth/{provider}/start:
    post:
      summary: Initiate OAuth provider login (Google, GitHub, …)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthStartRequest"
      responses:
        "200":
          description: Provider authorization URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/oauth/{provider}/callback:
    get:
      summary: OAuth provider callback (browser redirect)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: |
            Redirects to `redirect_uri?code=...&state=...` on success,
            or to `frontend.tfa_redirect_uri?tfa_session_id=...` when TFA is required.
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/web3/start:
    post:
      summary: Initiate Web3/SIWE login — returns message to sign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Web3StartRequest"
      responses:
        "200":
          description: SIWE message and its keccak256 hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Web3StartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/web3/consume:
    post:
      summary: Complete Web3 login by submitting the signed message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Web3ConsumeRequest"
      responses:
        "200":
          description: Redirect URL with authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"


components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Common ───────────────────────────────────────────────────────────────

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
      required: [ok]

    FieldError:
      type: object
      properties:
        reason:
          type: string
          description: Field name
        message:
          type: string
          description: Validation tag (e.g. required, email, password)
      required: [reason, message]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - invalid_credentials
            - registration_failed
            - verification_failed
            - resend_failed
            - request_failed
            - unsupported_response_type
            - unsupported_grant_type
            - server_error
            - unauthorized
        error_description:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
          description: Field-level validation errors
      required: [error]

    # ─── User ─────────────────────────────────────────────────────────────────

    CredentialResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: "email | phone | web3 | oauth:{provider}"
          example: email
        value:
          type: string
        verified:
          type: boolean
      required: [id, type, value, verified]

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, blocked]
        tfa_method:
          type: string
          enum: [none, email, phone, totp]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/CredentialResponse"
      required: [id, status, tfa_method, created_at, updated_at, credentials]

    # ─── Auth flow ────────────────────────────────────────────────────────────

    AuthorizeInitResponse:
      type: object
      properties:
        auth_session_id:
          type: string
        client_name:
          type: string
        scope:
          type: string
      required: [auth_session_id, client_name, scope]

    LoginRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required: [auth_session_id, email, password]

    RegisterRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          description: Min 8 chars, must include uppercase, lowercase, digit, and special character
      required: [auth_session_id, email, password]

    LoginSuccessResponse:
      type: object
      properties:
        redirect_url:
          type: string
          description: Full redirect URI with code and state query params
      required: [redirect_url]

    TFARequiredResponse:
      type: object
      properties:
        tfa_required:
          type: boolean
          enum: [true]
        tfa_session_id:
          type: string
        tfa_method:
          type: string
          enum: [email, phone, totp]
        expires_in:
          type: integer
          description: TFA session TTL in seconds
      required: [tfa_required, tfa_session_id, tfa_method, expires_in]

    TFARequest:
      type: object
      properties:
        auth_session_id:
          type: string
        tfa_session_id:
          type: string
        code:
          type: string
      required: [auth_session_id, tfa_session_id, code]

    # ─── Verification ─────────────────────────────────────────────────────────

    VerificationRequiredResponse:
      type: object
      properties:
        verification_required:
          type: boolean
          enum: [true]
        verification_session_id:
          type: string
        verification_method:
          type: string
          enum: [email, phone]
      required: [verification_required, verification_session_id, verification_method]

    CredentialVerifyRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        verification_session_id:
          type: string
        code:
          type: string
      required: [auth_session_id, verification_session_id, code]

    CredentialVerifyResendRequest:
      type: object
      properties:
        verification_session_id:
          type: string
      required: [verification_session_id]

    # ─── TOTP ─────────────────────────────────────────────────────────────────

    TotpStartResponse:
      type: object
      properties:
        provisioning_uri:
          type: string
          description: "otpauth://totp/... URI for QR code generation"
        secret:
          type: string
          description: Base32-encoded TOTP secret (for manual entry)
      required: [provisioning_uri, secret]

    TotpConfirmRequest:
      type: object
      properties:
        code:
          type: string
          description: 6-digit code from authenticator app
      required: [code]

    TotpConfirmResponse:
      type: object
      properties:
        backup_codes:
          type: array
          items:
            type: string
          description: One-time backup codes (store securely)
      required: [backup_codes]

    # ─── TFA method ───────────────────────────────────────────────────────────

    TfaMethodResponse:
      type: object
      properties:
        method:
          type: string
          enum: [none, email, phone, totp]
      required: [method]

    TfaMethodRequest:
      type: object
      properties:
        method:
          type: string
          enum: [none, email, phone, totp]
      required: [method]

    # ─── OAuth / Web3 ─────────────────────────────────────────────────────────

    OAuthStartRequest:
      type: object
      properties:
        auth_session_id:
          type: string
      required: [auth_session_id]

    OAuthStartResponse:
      type: object
      properties:
        redirect_url:
          type: string
          description: Provider authorization URL (open in browser)
      required: [redirect_url]

    Web3StartRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        address:
          type: string
          description: Ethereum address (0x...)
      required: [auth_session_id, address]

    Web3StartResponse:
      type: object
      properties:
        message:
          type: string
          description: EIP-4361 SIWE message to sign with wallet
        hash:
          type: string
          description: Keccak256 hash of the message (hex)
      required: [message, hash]

    Web3ConsumeRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        message:
          type: string
          description: The SIWE message returned by /web3/start
        signature:
          type: string
          description: Hex-encoded signature from wallet (personal_sign)
      required: [auth_session_id, message, signature]

    # ─── Token ────────────────────────────────────────────────────────────────

    TokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token]
        code:
          type: string
          description: Required for authorization_code grant
        redirect_uri:
          type: string
          description: Required for authorization_code grant
        client_id:
          type: string
        client_secret:
          type: string
        refresh_token:
          type: string
          description: Required for refresh_token grant
      required: [grant_type, client_id, client_secret]

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
      required: [access_token, token_type, expires_in, refresh_token]
