openapi: 3.0.3
info:
  title: OpenAuth Gateway
  version: 1.0.0

tags:
  - name: Account
    description: Endpoints for authenticated users — session management, history, TFA settings
  - name: OAuth2
    description: OAuth2 authorization server core — authorize, token exchange, introspection
  - name: Auth Methods
    description: Email and phone registration and credential verification
  - name: OAuth2 Methods
    description: Third-party OAuth providers (Google, GitHub) and Web3/SIWE wallet login
  - name: Credentials
    description: Link and unlink additional credentials (email, phone, OAuth, Web3) to an existing account

paths:
  # ─── Account ─────────────────────────────────────────────────────────────────

  /api/logout:
    post:
      tags: [Account]
      summary: Invalidate current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/history:
    get:
      tags: [Account]
      summary: Get authorization history for the current user
      description: |
        Returns a paginated list of login events for the authenticated user,
        ordered by login date descending (newest first).

        IP resolution order: `CF-Connecting-IP` → `X-Real-IP` → direct connection IP.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based)
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of entries per page
      responses:
        "200":
          description: Authorization history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/totp/start:
    post:
      tags: [Account]
      summary: Begin TOTP setup — generates a new secret and provisioning URI
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpStartRequest"
      responses:
        "200":
          description: TOTP secret and otpauth:// URI for QR code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/totp/confirm:
    post:
      tags: [Account]
      summary: Confirm TOTP setup with a code from the authenticator app
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpConfirmRequest"
      responses:
        "200":
          description: TOTP activated; backup codes returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpConfirmResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/totp/unlink:
    post:
      tags: [Account]
      summary: Remove TOTP from the account
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpUnlinkRequest"
      responses:
        "200":
          description: TOTP removed or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/OkResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tfa/resend:
    post:
      tags: [Account]
      summary: Resend TFA verification code
      description: Resends the TFA code for an active TFA session. Rate limited by resend interval.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TfaResendRequest"
      responses:
        "200":
          description: Code resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tfa/method:
    get:
      tags: [Account]
      summary: Get current TFA method
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current TFA method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TfaMethodResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [Account]
      summary: Set TFA method
      description: |
        To set `totp`, TOTP must already be configured via `/api/totp/confirm`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TfaMethodRequest"
      responses:
        "200":
          description: TFA method updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── OAuth2 Core ─────────────────────────────────────────────────────────────

  /oauth2/authorize:
    get:
      tags: [OAuth2]
      summary: Initialize authorization session
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: state
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            default: openid
      responses:
        "200":
          description: Auth session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeInitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

    post:
      tags: [OAuth2]
      summary: Submit credentials (login step) or TFA code (TFA step)
      description: |
        **Login step:** provide `method` + credentials + `password`.
        If TFA is enabled, returns `tfa_required: true` with `tfa_session_id`.

        **TFA step:** provide `auth_session_id` + `tfa_session_id` + `code`.
        Completes authentication and returns the redirect URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Redirect URL or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginSuccessResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /oauth2/introspect:
    post:
      tags: [OAuth2]
      summary: Introspect a token (RFC 7662)
      description: |
        Validates an access token and returns its metadata.
        Requires client credentials (`client_id` + `client_secret`).
        Returns `{ "active": false }` for invalid, expired, or revoked tokens.
        Intended for use by resource servers (e.g. Spring Security OAuth2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: Token metadata (active or inactive)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /oauth2/token:
    post:
      tags: [OAuth2]
      summary: Exchange authorization code or refresh token for tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Auth Methods ─────────────────────────────────────────────────────────────

  /oauth2/methods/email/register:
    post:
      tags: [Auth Methods]
      summary: Register with email and password
      description: |
        Creates a new account and sends a verification code to the provided email.
        Tokens are NOT issued immediately — the client must verify the email first
        via `POST /oauth2/methods/email/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Verification required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationRequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/email/verify:
    post:
      tags: [Auth Methods]
      summary: Verify email with the code received after registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialVerifyRequest"
      responses:
        "200":
          description: Email verified — redirect URL with authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/email/verify/resend:
    post:
      tags: [Auth Methods]
      summary: Resend verification code
      description: |
        Rate-limited — subject to `verification.resend_interval` (default 60 s).
        Returns `resend_failed` with description `"Resend too soon"` if called too early.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialVerifyResendRequest"
      responses:
        "200":
          description: Code resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/phone/register:
    post:
      tags: [Auth Methods]
      summary: Register with phone number and password
      description: |
        Creates a new account and sends a verification code via SMS.
        Tokens are NOT issued immediately — verify phone first via
        `POST /oauth2/methods/phone/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Verification required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationRequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/phone/verify:
    post:
      tags: [Auth Methods]
      summary: Verify phone number with the SMS code received after registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialVerifyRequest"
      responses:
        "200":
          description: Phone verified — redirect URL with authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/phone/verify/resend:
    post:
      tags: [Auth Methods]
      summary: Resend SMS verification code
      description: |
        Rate-limited — subject to `verification.resend_interval` (default 60 s).
        Returns `resend_failed` with description `"Resend too soon"` if called too early.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialVerifyResendRequest"
      responses:
        "200":
          description: Code resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/oauth/{provider}/start:
    post:
      tags: [OAuth2 Methods]
      summary: Initiate OAuth provider login (Google, GitHub, …)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthStartRequest"
      responses:
        "200":
          description: Provider authorization URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/oauth/{provider}/callback:
    get:
      tags: [OAuth2 Methods]
      summary: OAuth provider callback (browser redirect)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: |
            Redirects to `redirect_uri?code=...&state=...` on success,
            or to `frontend.tfa_redirect_uri?tfa_session_id=...` when TFA is required.
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/web3/start:
    post:
      tags: [OAuth2 Methods]
      summary: Initiate Web3/SIWE login — returns message to sign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Web3StartRequest"
      responses:
        "200":
          description: SIWE message and its keccak256 hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Web3StartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /oauth2/methods/web3/consume:
    post:
      tags: [OAuth2 Methods]
      summary: Complete Web3 login by submitting the signed message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Web3ConsumeRequest"
      responses:
        "200":
          description: Redirect URL with authorization code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Credentials ──────────────────────────────────────────────────────────

  /api/credentials/email/start:
    post:
      tags: [Credentials]
      summary: Start email credential linking
      description: Sends a verification code to the email address. Requires a valid access token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialEmailLinkStartRequest"
      responses:
        "200":
          description: Verification code sent or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CredentialLinkStartResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/email/confirm:
    post:
      summary: Confirm email credential linking
      description: Verifies the code and links the email credential to the user's account.
      tags: [Credentials]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialLinkConfirmRequest"
      responses:
        "200":
          description: Email linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/phone/start:
    post:
      summary: Start phone credential linking
      description: Sends an SMS verification code to the phone number.
      tags: [Credentials]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialPhoneLinkStartRequest"
      responses:
        "200":
          description: Verification code sent or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CredentialLinkStartResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/phone/confirm:
    post:
      summary: Confirm phone credential linking
      description: Verifies the code and links the phone credential to the user's account.
      tags: [Credentials]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialLinkConfirmRequest"
      responses:
        "200":
          description: Phone linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/oauth/{provider}/start:
    post:
      summary: Start OAuth credential linking
      description: Returns an OAuth authorization URL to link a provider account.
      tags: [Credentials]
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
      responses:
        "200":
          description: OAuth authorization URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/oauth/{provider}/callback:
    get:
      summary: OAuth credential link callback
      description: Handles the OAuth provider redirect, exchanges the code, and links the credential.
      tags: [Credentials]
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Credential linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/credentials/web3/start:
    post:
      summary: Start Web3 credential linking
      description: Generates a SIWE message for the user to sign with their wallet.
      tags: [Credentials]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                  description: Ethereum address (0x...)
              required: [address]
      responses:
        "200":
          description: SIWE message to sign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Web3StartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/web3/consume:
    post:
      summary: Confirm Web3 credential linking
      description: Verifies the SIWE signature and links the wallet address.
      tags: [Credentials]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                signature:
                  type: string
              required: [message, signature]
      responses:
        "200":
          description: Wallet linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/credentials/{id}:
    delete:
      summary: Unlink a credential
      description: Removes a credential from the account. Fails if it's the last verified credential. Requires TFA if enabled.
      tags: [Credentials]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialUnlinkRequest"
      responses:
        "200":
          description: Credential removed or TFA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/OkResponse"
                  - $ref: "#/components/schemas/TFARequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"


components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Common ───────────────────────────────────────────────────────────────

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [true]
      required: [ok]

    FieldError:
      type: object
      properties:
        reason:
          type: string
          description: Field name
        message:
          type: string
          description: Validation tag (e.g. required, email, password)
      required: [reason, message]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - invalid_credentials
            - registration_failed
            - verification_failed
            - resend_failed
            - request_failed
            - unsupported_response_type
            - unsupported_grant_type
            - server_error
            - unauthorized
        error_description:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
          description: Field-level validation errors
      required: [error]

    # ─── User ─────────────────────────────────────────────────────────────────

    CredentialResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: "email | phone | web3 | oauth:{provider}"
          example: email
        value:
          type: string
        verified:
          type: boolean
      required: [id, type, value, verified]

    # ─── Auth History ─────────────────────────────────────────────────────────

    AuthHistoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
        method:
          type: string
          description: "Auth method used: email | phone | oauth:{provider} | web3"
          example: email
        ip_address:
          type: string
          description: Client IP address
          example: "93.184.216.34"
        user_agent:
          type: string
          description: Client User-Agent header value
          example: "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) ..."
        created_at:
          type: string
          format: date-time
      required: [id, session_id, method, ip_address, user_agent, created_at]

    AuthHistoryResponse:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/AuthHistoryEntry"
          description: Entries for the requested page, ordered by login date descending
        total:
          type: integer
          format: int64
          description: Total number of login events across all pages
        page:
          type: integer
          description: Current page number
        page_size:
          type: integer
          description: Number of entries per page
      required: [history, total, page, page_size]

    # ─── Auth flow ────────────────────────────────────────────────────────────

    AuthorizeInitResponse:
      type: object
      properties:
        auth_session_id:
          type: string
        client_name:
          type: string
        scope:
          type: string
      required: [auth_session_id, client_name, scope]

    LoginRequest:
      type: object
      description: |
        Used for both the **login step** and the **TFA step** of `POST /oauth2/authorize`.

        **Login step:** provide `method` + `email`/`phone` + `password`.
        **TFA step:** provide `tfa_session_id` + `code` (omit credentials).
      properties:
        auth_session_id:
          type: string
        method:
          type: string
          enum: [email, phone]
          default: email
        email:
          type: string
          format: email
        phone:
          type: string
          example: "+15551234567"
          description: Phone in E.164 format (login step, method=phone)
        password:
          type: string
        tfa_session_id:
          type: string
          description: From TFARequiredResponse — present only in TFA step
        code:
          type: string
          description: TFA code (TOTP / email OTP / SMS OTP) — present only in TFA step
      required: [auth_session_id]

    RegisterRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        email:
          type: string
          format: email
          description: Required for email registration
        phone:
          type: string
          example: "+15551234567"
          description: Required for phone registration (E.164 format)
        password:
          type: string
          description: Min 8 chars, must include uppercase, lowercase, digit, and special character
      required: [auth_session_id, password]

    LoginSuccessResponse:
      type: object
      properties:
        redirect_url:
          type: string
          description: Full redirect URI with code and state query params
      required: [redirect_url]

    TFARequiredResponse:
      type: object
      properties:
        tfa_required:
          type: boolean
          enum: [true]
        tfa_session_id:
          type: string
        tfa_method:
          type: string
          enum: [email, phone, totp]
        expires_in:
          type: integer
          description: TFA session TTL in seconds
      required: [tfa_required, tfa_session_id, tfa_method, expires_in]

    # ─── Verification ─────────────────────────────────────────────────────────

    VerificationRequiredResponse:
      type: object
      properties:
        verification_required:
          type: boolean
          enum: [true]
        verification_session_id:
          type: string
        verification_method:
          type: string
          enum: [email, phone]
      required: [verification_required, verification_session_id, verification_method]

    CredentialVerifyRequest:
      type: object
      properties:
        auth_session_id:
          type: string
          description: "Required for continuing the OAuth2 flow to identify the authorization context."
        verification_session_id:
          type: string
          description: "The session ID received from the registration step."
        code:
          type: string
          description: "The 6-digit verification code sent to email or phone."
      required: [auth_session_id, verification_session_id, code]

    CredentialVerifyResendRequest:
      type: object
      properties:
        verification_session_id:
          type: string
      required: [verification_session_id]

    # ─── TOTP ─────────────────────────────────────────────────────────────────

    TotpStartRequest:
      type: object
      properties:
        tfa_session_id:
          type: string
          description: Optional. Required if 2FA is already enabled.
        code:
          type: string
          description: Optional. Required if 2FA is already enabled (code from email/sms/totp/backup).

    TotpStartResponse:
      type: object
      properties:
        provisioning_uri:
          type: string
          description: "otpauth://totp/... URI for QR code generation"
        secret:
          type: string
          description: Base32-encoded TOTP secret (for manual entry)
        tfa_required:
          type: boolean
          description: Indicates if TFA verification is needed before starting setup.
        tfa_session_id:
          type: string
        tfa_method:
          type: string
        expires_in:
          type: integer
      required: []

    TotpConfirmRequest:
      type: object
      properties:
        code:
          type: string
          description: 6-digit code from authenticator app
      required: [code]

    TotpConfirmResponse:
      type: object
      properties:
        backup_codes:
          type: array
          items:
            type: string
          description: One-time backup codes (store securely)
      required: [backup_codes]

    TotpUnlinkRequest:
      type: object
      properties:
        tfa_session_id:
          type: string
        code:
          type: string

    TfaMethodResponse:
      type: object
      properties:
        method:
          type: string
          enum: [none, email, phone, totp]
      required: [method]

    TfaMethodRequest:
      type: object
      properties:
        method:
          type: string
          enum: [none, email, phone, totp]
      required: [method]

    # ─── OAuth / Web3 ─────────────────────────────────────────────────────────

    OAuthStartRequest:
      type: object
      properties:
        auth_session_id:
          type: string
      required: [auth_session_id]

    OAuthStartResponse:
      type: object
      properties:
        redirect_url:
          type: string
          description: Provider authorization URL (open in browser)
      required: [redirect_url]

    Web3StartRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        address:
          type: string
          description: Ethereum address (0x...)
      required: [auth_session_id, address]

    Web3StartResponse:
      type: object
      properties:
        message:
          type: string
          description: EIP-4361 SIWE message to sign with wallet
        hash:
          type: string
          description: Keccak256 hash of the message (hex)
      required: [message, hash]

    Web3ConsumeRequest:
      type: object
      properties:
        auth_session_id:
          type: string
        message:
          type: string
          description: The SIWE message returned by /web3/start
        signature:
          type: string
          description: Hex-encoded signature from wallet (personal_sign)
      required: [auth_session_id, message, signature]

    # ─── Token ────────────────────────────────────────────────────────────────

    TokenRequest:
      type: object
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token]
        code:
          type: string
          description: Required for authorization_code grant
        redirect_uri:
          type: string
          description: Required for authorization_code grant
        client_id:
          type: string
        client_secret:
          type: string
        refresh_token:
          type: string
          description: Required for refresh_token grant
      required: [grant_type, client_id, client_secret]

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
      required: [access_token, token_type, expires_in, refresh_token]

    # ─── Credentials ──────────────────────────────────────────────────────────

    CredentialEmailLinkStartRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        tfa_session_id:
          type: string
        code:
          type: string
          example: "123456"
      required: [email]

    CredentialPhoneLinkStartRequest:
      type: object
      properties:
        phone:
          type: string
          example: "+1234567890"
        tfa_session_id:
          type: string
        code:
          type: string
          example: "123456"
      required: [phone]

    CredentialLinkConfirmRequest:
      type: object
      properties:
        verification_session_id:
          type: string
        code:
          type: string
          example: "123456"
      required: [verification_session_id, code]

    CredentialLinkStartResponse:
      type: object
      properties:
        verification_session_id:
          type: string
        verification_method:
          type: string
          enum: [email, phone]
        expires_in:
          type: integer
      required: [verification_session_id, verification_method, expires_in]

    CredentialUnlinkRequest:
      type: object
      properties:
        tfa_session_id:
          type: string
        code:
          type: string
          example: "123456"

    TfaResendRequest:
      type: object
      properties:
        tfa_session_id:
          type: string
      required: [tfa_session_id]


    # ─── Introspect (RFC 7662) ────────────────────────────────────────────────

    IntrospectRequest:
      type: object
      properties:
        token:
          type: string
          description: The access token to introspect
        client_id:
          type: string
        client_secret:
          type: string
      required: [token, client_id, client_secret]

    IntrospectResponse:
      type: object
      properties:
        active:
          type: boolean
          description: Whether the token is valid and not expired/revoked
        sub:
          type: string
          format: uuid
          description: User ID
        username:
          type: string
          description: Primary verified email of the user
        roles:
          type: array
          items:
            type: string
          description: Casbin roles assigned to the user
          example: ["admin", "editor"]
        credentials:
          type: array
          items:
            $ref: "#/components/schemas/CredentialResponse"
          description: Present only when the token scope includes "credentials"
        scope:
          type: string
          example: openid credentials
        token_type:
          type: string
          enum: [Bearer]
        exp:
          type: integer
          format: int64
          description: Token expiration (Unix timestamp)
        iat:
          type: integer
          format: int64
          description: Token issued-at (Unix timestamp)
      required: [active]
